# ItemEditor — Custom Items Data
#
# Edit this file to add, modify, or remove custom items.
#
# Available fields:
#   material     — Minecraft item identifier (e.g. minecraft:diamond_sword)
#   name         — Display name with color codes (&b, &c, &l, etc.)
#   lore         — List of lore lines (supports color codes)
#   amount       — Stack size (default: 1)
#   damage       — Item damage value (0 = pristine)
#   unbreakable  — true/false (infinite durability)
#   enchant      — Dict of enchantment_id: level (bypasses vanilla limits)
#
# Enchantment IDs:
#   minecraft:sharpness, minecraft:mending, minecraft:efficiency,
#   minecraft:protection, minecraft:fire_aspect, minecraft:unbreaking,
#   minecraft:looting, minecraft:power, minecraft:infinity, ...
#
# Color codes (use & instead of §):
#   &0 Black  &1 Dark Blue  &2 Dark Green  &3 Dark Aqua
#   &4 Dark Red  &5 Dark Purple  &6 Gold  &7 Gray
#   &8 Dark Gray  &9 Blue  &a Green  &b Aqua
#   &c Red  &d Light Purple  &e Yellow  &f White
#   &k Obfuscated  &l Bold  &m Strikethrough
#   &n Underline  &o Italic  &r Reset

items:
  example_sword:
    material: minecraft:diamond_sword
    name: "&bExample Sword"
    lore:
      - "&7Custom Lore"
      - "&eVery Strong"
    damage: 20
    unbreakable: true
    enchant:
      minecraft:mending: 100000
      minecraft:sharpness: 5000

  dragon_pickaxe:
    material: minecraft:diamond_pickaxe
    name: "&5&lDragon Pickaxe"
    lore:
      - "&7Mine anything instantly"
      - "&cOwner only!"
    unbreakable: true
    enchant:
      minecraft:efficiency: 5000
      minecraft:unbreaking: 1000
      minecraft:mending: 50000

  god_axe:
    material: minecraft:netherite_axe
    name: "&6&lGod Axe"
    lore:
      - "&7Forged by the gods"
      - "&eUnstoppable power"
    unbreakable: true
    enchant:
      minecraft:sharpness: 10000
      minecraft:fire_aspect: 5000
      minecraft:mending: 100000
